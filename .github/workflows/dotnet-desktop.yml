name: WinUI 3 Production Release

# 1. 触发条件：当你在 GitHub 上创建一个新的 Release 时触发
on:
  release:
    types: [published]

jobs:
  build:
    runs-on: windows-latest

    permissions:
      contents: write # 允许自动修改 Release 页面并上传附件

    steps:
    # 1. 检出代码
    - name: Checkout Source Code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    # 2. 安装配置 .NET 8.0/10.0 SDK (根据你实际使用的 .NET 版本调整)
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x' # 如果你已经完全升级到了 .NET 10，可以改为 '10.0.x'

    # 3. 设置 MSBuild 环境（WinUI 3 构建所需环境）
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v2

    # 4. 还原 NuGet 依赖（针对 WinUI 3 优化，指定 x64 架构）
    - name: Restore Dependencies
      run: |
        nuget restore SimpVid_Gist_WinUI3.slnx

    # 5. 编译并发布 WinUI 3 项目
    # 注意：这里假设你的 WinUI 3 项目文件夹/项目名变更为 SimpVid_Gist_WinUI3
    - name: Build and Publish WinUI 3 App
      run: |
        msbuild SimpVid_Gist_WinUI3/SimpVid_Gist_WinUI3.csproj `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /p:RuntimeIdentifier=win-x64 `
          /p:PublishDir=../publish/ `
          /t:Publish

    # 6. 将发布出来的文件夹打包为 ZIP（因为 WinUI 3 包含大量必要的依赖 DLL 和资源文件）
    - name: Archive Build Artifacts
      shell: pwsh
      run: |
        Compress-Archive -Path ./publish/* -DestinationPath ./SimpVid_Gist_WinUI3_x64.zip

    # 7. 自动将打包好的 .zip 附件挂载到触发该工作流的 Release 页面中
    - name: Upload Binary to GitHub Release
      uses: svenstaro/upload-release-action@v2
      with:
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        file: ./SimpVid_Gist_WinUI3_x64.zip
        asset_name: SimpVid_Gist_WinUI3_x64.zip
        tag: ${{ github.event.release.tag_name }}
        overwrite: true
